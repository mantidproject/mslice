name: Build and upload conda package
description: Build and upload conda package

inputs:
  repository:
    description: 'Anaconda repository'
    required: true
    default: 'mantid'
  label:
    description: 'Label'
    required: false
    default: 'nightly'
  token:
    description: 'Anaconda API Token'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install build tools
      shell: bash -l {0}
      run: mamba install -y -c conda-forge conda-build anaconda-client

    - name: Build package
      shell: bash -l {0}
      run: |
        conda config --set solver libmamba
        conda-build \
          -c mantid/label/nightly \
          -c mantid \
          $GITHUB_WORKSPACE/conda
          --user ${{ inputs.repository }} \
          --token ${{ inputs.token }} \
          --label ${{ inputs.label }} \
         |& tee upload.log
         grep "Upload complete" upload.log
